<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rastreamento de Pedido</title>
</head>
<body style="margin:0;padding:0;font-family:sans-serif;background:#f5f5f5;">

<div id="rt-wrap" style="max-width:680px;margin:0 auto;padding:2rem 1rem;font-family:sans-serif;color:#1a1a1a;">
  <h2 style="text-align:center;font-size:22px;font-weight:600;margin-bottom:8px;">Rastreamento de pedido</h2>
  <p style="text-align:center;color:#666;margin-bottom:2rem;font-size:15px;">Digite o código de rastreio para acompanhar a sua entrega</p>
  <div style="background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:1.5rem;margin-bottom:1.5rem;">
    <div style="display:flex;gap:10px;">
      <input id="rt-codigo" type="text" placeholder="Ex: BR123456789BR" maxlength="40"
        style="flex:1;font-size:15px;padding:0 14px;height:46px;border:1px solid #ccc;border-radius:8px;outline:none;" />
      <button id="rt-btn" onclick="rtRastrear()"
        style="height:46px;padding:0 24px;background:#185FA5;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;">
        Rastrear
      </button>
    </div>
    <p style="font-size:13px;color:#888;margin-top:10px;">O código de rastreio está no e-mail de confirmação do pedido.</p>
  </div>
  <div id="rt-resultado"></div>
</div>

<script>
var PROXY = "https://rastreio-proxy.svini5762.workers.dev";

function rtRastrear() {
  var codigo = document.getElementById("rt-codigo").value.trim().toUpperCase();
  if (!codigo) return;
  var el = document.getElementById("rt-resultado");
  el.innerHTML = '<div style="background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:1.5rem;text-align:center;color:#888;font-size:14px;">Consultando rastreio...</div>';
  document.getElementById("rt-btn").disabled = true;
  document.getElementById("rt-btn").style.background = "#ccc";

  fetch(PROXY + "?endpoint=register", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify([{ "number": codigo }])
  })
  .then(function(){ return buscarRastreio(codigo, el); })
  .catch(function(){ return buscarRastreio(codigo, el); });
}

function buscarRastreio(codigo, el) {
  return fetch(PROXY + "?endpoint=gettrackinfo", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify([{ "number": codigo }])
  })
  .then(function(r){ return r.json(); })
  .then(function(data){
    var item = data.data && data.data.accepted && data.data.accepted[0];
    if (!item || !item.track_info) {
      el.innerHTML = rtFallback(codigo);
      rtResetar();
      return;
    }

    var trackInfo = item.track_info;
    var statusStr = trackInfo.latest_status ? trackInfo.latest_status.status : "";
    var eventos = trackInfo.tracking && trackInfo.tracking.providers
      ? trackInfo.tracking.providers.reduce(function(acc, p){ return acc.concat(p.events || []); }, [])
      : [];

    if (eventos.length === 0) {
      el.innerHTML = rtFallback(codigo);
      rtResetar();
      return;
    }

    eventos.sort(function(a, b){ return new Date(b.time_iso) - new Date(a.time_iso); });
    el.innerHTML = rtResultado(codigo, statusStr, eventos);
    rtResetar();
  })
  .catch(function(){
    el.innerHTML = rtFallback(codigo);
    rtResetar();
  });
}

function rtResetar() {
  document.getElementById("rt-btn").disabled = false;
  document.getElementById("rt-btn").style.background = "#185FA5";
}

var statusMap = {
  "Delivered":       { label: "Entregue",             color: "#EAF3DE", textColor: "#3B6D11" },
  "InTransit":       { label: "Em trânsito",           color: "#E6F1FB", textColor: "#185FA5" },
  "OutForDelivery":  { label: "Saiu para entrega",     color: "#E6F1FB", textColor: "#185FA5" },
  "FailedAttempt":   { label: "Tentativa de entrega",  color: "#FAEEDA", textColor: "#854F0B" },
  "InfoReceived":    { label: "Informação recebida",   color: "#FAEEDA", textColor: "#854F0B" },
  "Exception":       { label: "Exceção",               color: "#FCEBEB", textColor: "#A32D2D" },
  "Expired":         { label: "Expirado",              color: "#FCEBEB", textColor: "#A32D2D" },
  "NotFound":        { label: "Não encontrado",        color: "#F1EFE8", textColor: "#5F5E5A" }
};

function rtResultado(codigo, statusStr, eventos) {
  var s = statusMap[statusStr] || { label: "Em trânsito", color: "#E6F1FB", textColor: "#185FA5" };

  var tl = eventos.map(function(ev, i){
    var data = ev.time_iso ? new Date(ev.time_iso).toLocaleString("pt-BR") : "";
    var cidade = ev.address && ev.address.city ? ev.address.city : (ev.location || "");
    var dotStyle = i===0
      ? "width:12px;height:12px;border-radius:50%;background:#185FA5;border:2px solid #0C447C;margin-top:4px;flex-shrink:0;"
      : "width:12px;height:12px;border-radius:50%;background:#B5D4F4;border:2px solid #378ADD;margin-top:4px;flex-shrink:0;";
    return '<div style="display:flex;gap:14px;">'
      + '<div style="display:flex;flex-direction:column;align-items:center;width:26px;flex-shrink:0;">'
      + '<div style="' + dotStyle + '"></div>'
      + (i < eventos.length-1 ? '<div style="width:2px;flex:1;background:#e8e8e8;min-height:18px;"></div>' : '')
      + '</div>'
      + '<div style="padding-bottom:18px;flex:1;">'
      + '<div style="font-size:14px;font-weight:600;">' + (ev.description || "") + '</div>'
      + (cidade ? '<div style="font-size:13px;color:#666;margin-top:2px;">' + cidade + '</div>' : '')
      + (data ? '<div style="font-size:12px;color:#999;margin-top:2px;">' + data + '</div>' : '')
      + '</div></div>';
  }).join('');

  return '<div style="background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:1.5rem;">'
    + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem;flex-wrap:wrap;gap:8px;">'
    + '<div style="font-size:13px;color:#666;">Código: <b style="color:#1a1a1a;font-family:monospace;">' + codigo + '</b></div>'
    + '<span style="font-size:12px;font-weight:600;padding:4px 12px;border-radius:6px;background:' + s.color + ';color:' + s.textColor + ';">' + s.label + '</span>'
    + '</div>'
    + '<div>' + tl + '</div>'
    + '</div>';
}

function rtFallback(codigo) {
  return '<div style="background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:1.5rem;">'
    + '<p style="font-size:14px;color:#555;line-height:1.7;margin-bottom:12px;">Não foi possível consultar. Clique abaixo para rastrear diretamente:</p>'
    + '<a href="https://www.17track.net/pt/track#nums=' + codigo + '" target="_blank" '
    + 'style="display:inline-block;padding:10px 22px;background:#185FA5;color:#fff;border-radius:8px;text-decoration:none;font-size:14px;font-weight:600;">'
    + 'Ver no 17track</a>'
    + '</div>';
}

document.getElementById("rt-codigo").addEventListener("keydown", function(e){
  if (e.key === "Enter") rtRastrear();
});
</script>

</body>
</html>
